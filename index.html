<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<meta name="viewport"
  content="width=device-width,
           height=device-height,
           initial-scale=1.0,
           maximum-scale=1.0,
           user-scalable=no">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;

  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: rgba(0,0,0,0);
}
</style>
</head>

<body>

<script>
let intervals = [];
let lastTapTime = null;

const MAX_BUFFER = 20;
const MIN_VARIANCE = 4;

function computeStats() {
  if (intervals.length < 5) return null;

  let mean = intervals.reduce((a,b)=>a+b,0) / intervals.length;

  let variance = intervals.reduce((a,b)=>a + (b-mean)*(b-mean), 0) / intervals.length;

  variance = Math.max(variance, MIN_VARIANCE);

  return { mean, variance };
}

function shouldCollapse(newInterval) {
  const stats = computeStats();
  if (!stats) return false;

  let deviation = Math.abs(newInterval - stats.mean);

  return deviation > (2 * Math.sqrt(stats.variance));
}

function collapse() {
  intervals = intervals.slice(-5);
  lastTapTime = null;

  document.body.style.background = "#111";
  setTimeout(() => {
    document.body.style.background = "#000";
  }, 40);
}

function kill(e) {
  e.preventDefault();
}

document.addEventListener('touchstart', kill, { passive: false });

document.addEventListener('touchend', e => {
  kill(e);

  if (e.changedTouches.length !== 1) return;

  const now = performance.now();

  if (lastTapTime !== null) {
    const dt = now - lastTapTime;

    if (shouldCollapse(dt)) {
      collapse();
      return;
    }

    intervals.push(dt);
    if (intervals.length > MAX_BUFFER) intervals.shift();
  }

  lastTapTime = now;

}, { passive: false });

document.addEventListener('touchmove', kill, { passive: false });

document.addEventListener('touchcancel', e => {
  kill(e);
  lastTapTime = null;
}, { passive: false });
</script>

</body>
</html>
