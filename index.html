<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport"
  content="width=device-width,
           height=device-height,
           initial-scale=1.0,
           maximum-scale=1.0,
           user-scalable=no">
<style>
html, body, * { -webkit-tap-highlight-color: transparent !important; }
html, body {
  margin:0; padding:0;
  width:100%; height:100%;
  background: rgb(130, 60, 255);
  overflow:hidden;
  -webkit-user-select:none;
  user-select:none;
}
body { -webkit-touch-callout:none; touch-action:none; }
#score {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: rgba(255,255,255,0.6);
  font: 32px monospace;
  pointer-events: none;
  white-space: pre;
  text-align: center;
}
</style>
</head>
<body>
<div id="score">0.0000</div>
<script>
document.body.style.webkitTapHighlightColor = 'transparent';

const ALPHA = 0.2;

let mean        = 0;
let variance    = 0;
let instability = 0;
let prevRaw     = 0;
let drift       = 0;
let state       = 0;
let score       = 0;
let perfScore   = 0;
let lastTapTime = null;
let lastTime    = performance.now();

const scoreEl = document.getElementById('score');
function render() {
  scoreEl.textContent = Math.round(perfScore * 10000).toString().padStart(5, '0');

  const m = Math.min(1, Math.abs(state));
  const r = Math.round(60 + 160 * m);
  const g = Math.round(80 - 60 * m);
  const b = 255;

  document.body.style.background = `rgb(${r}, ${g}, ${b})`;
  scoreEl.style.color = 'rgba(255,255,255,0.6)';
}

function onTap() {
  const now = performance.now();
  if (lastTapTime === null) { lastTapTime = now; return; }

  const dt = now - lastTapTime;
  lastTapTime = now;
  if (dt <= 0) return;

  const prevMean = mean > 0 ? mean : dt;
  mean = prevMean + ALPHA * (dt - prevMean);
  const err = dt - prevMean;
  variance = (1 - ALPHA) * (variance + ALPHA * err * err);

  const std = Math.sqrt(variance + 1);
  const cv = std / (std + Math.abs(mean) + 1);
  const coherence = 4 * cv * (1 - cv) * (1 - prevRaw);

  instability = (1 - ALPHA) * instability + ALPHA * (Math.abs(err) / (std + 1));
  const penalty = 1 / (1 + instability);
  const raw = coherence * penalty;

  drift = (1 - ALPHA) * drift + ALPHA * Math.abs(raw - prevRaw);
  const stabilityWeight = 1 / (1 + drift);
  const instabilityWeight = 1 / (1 + instability);
  const direction = raw - prevRaw;
  state += direction * stabilityWeight * instabilityWeight;

  const improvement = Math.max(0, raw - prevRaw);
  score += improvement;

  prevRaw = raw;
  render();
}

function tick() {
  const now = performance.now();
  const dt = (now - lastTime) / 1000;
  lastTime = now;

  const decayRate = ALPHA + instability / (1 + instability);
  state     *= Math.exp(-decayRate * dt);
  score     *= Math.exp(-decayRate * dt);
  perfScore += Math.abs(state) * dt;
  perfScore *= Math.exp(-decayRate * dt);

  render();
  requestAnimationFrame(tick);
}

function kill(e) { e.preventDefault(); }

document.addEventListener('touchstart', kill, { passive: false });
document.addEventListener('touchmove', kill, { passive: false });
document.addEventListener('touchend', e => {
  kill(e);
  if (e.changedTouches.length === 1) onTap();
}, { passive: false });
document.addEventListener('touchcancel', kill, { passive: false });
document.addEventListener('pointerup', e => {
  if (e.pointerType !== 'touch') onTap();
});

tick();
</script>
</body>
</html>
