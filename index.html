<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<style>
* { -webkit-tap-highlight-color: transparent !important; }
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  touch-action: none;
}
#dot {
  width: 48px;
  height: 48px;
  border-radius: 50%;
}
</style>
</head>
<body>
<div id="dot"></div>
<script>
const COLORS = ['#c4b5fd', '#7dd3fc'];
const BASE = 0.5;

let state = 0;
let pressure = 0;
let stability = 0;
let lastTap = 0;

const dot = document.getElementById('dot');

function render() {
  dot.style.background = COLORS[state];
}

function onTap() {
  const now = performance.now();
  if (now - lastTap < 200) return;
  lastTap = now;

  const hidden = Math.sin(now * 0.001);
  const alignment = 1 - Math.pow(Math.abs(hidden), 0.5);
  const score = alignment;

  const threshold = BASE + pressure;

  if (score >= threshold) {
    pressure *= 0.1;
    stability += 0.05;
  } else {
    state = 1 - state;
    pressure = 0;
    stability = 0;
  }

  render();
}

function tick() {
  pressure += 0.00008;

  if (pressure > 0.8) {
    state = 1 - state;
    pressure = 0;
    stability = 0;
    render();
  }

  requestAnimationFrame(tick);
}

document.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
document.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.changedTouches.length === 1) onTap();
}, { passive: false });

document.addEventListener('pointerup', e => {
  if (e.pointerType !== 'touch') onTap();
});

tick();
render();
</script>
</body>
</html>
