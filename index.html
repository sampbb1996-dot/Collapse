<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport"
  content="width=device-width,
           height=device-height,
           initial-scale=1.0,
           maximum-scale=1.0,
           user-scalable=no">
<style>
html, body, * { -webkit-tap-highlight-color: transparent !important; }
html, body { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; -webkit-user-select:none; user-select:none; }
body { -webkit-touch-callout:none; touch-action:none; }
</style>
</head>
<body>
<script>
document.body.style.webkitTapHighlightColor = 'transparent';

const ALPHA = 0.2;
const K = 2;
const MIN_VARIANCE = 4;

let mean = 0;
let variance = MIN_VARIANCE;
let initialized = false;
let lastTapTime = null;

function onTap() {
  const now = performance.now();
  if (lastTapTime === null) { lastTapTime = now; return; }
  const dt = now - lastTapTime;
  if (!initialized) { mean = dt; initialized = true; lastTapTime = now; return; }
  const prevMean = mean;
  const prevVariance = variance;
  if (Math.abs(dt - prevMean) > K * Math.sqrt(prevVariance)) {
    lastTapTime = null;
    return;
  }
  mean += ALPHA * (dt - prevMean);
  variance = (1 - ALPHA) * (variance + ALPHA * (dt - prevMean) * (dt - prevMean));
  variance = Math.max(variance, MIN_VARIANCE);
  lastTapTime = now;
}

function kill(e) { e.preventDefault(); }
document.addEventListener('touchstart',  kill, { passive: false });
document.addEventListener('touchmove',   kill, { passive: false });
document.addEventListener('touchend', e => { kill(e); if (e.changedTouches.length !== 1) return; onTap(); }, { passive: false });
document.addEventListener('touchcancel', e => { kill(e); lastTapTime = null; }, { passive: false });
document.addEventListener('pointerup', e => { if (e.pointerType === 'touch') return; onTap(); });
</script>
</body>
</html>
