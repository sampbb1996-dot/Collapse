<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="color-scheme" content="dark" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />

  <title>Tap Surface</title>

  <style>
    *, *::before, *::after {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
    }

    #surface {
      position: fixed;
      inset: 0;
      background: #000;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
  </style>
</head>

<body>
  <div id="surface"></div>

  <script>
    (function () {
      var surface = document.getElementById("surface");

      var lastTap = null;
      var mean = null;
      var variance = 0;

      var ALPHA = 0.2;
      var MIN_VARIANCE = 1;

      function updateState(dt) {
        if (mean === null) {
          mean = dt;
          variance = 0;
          return;
        }
        var diff = dt - mean;
        mean += ALPHA * diff;
        variance = (1 - ALPHA) * (variance + ALPHA * diff * diff);
      }

      function shouldCollapse(dt) {
        if (mean === null) return false;

        var dev = Math.abs(dt - mean);
        var v = Math.max(variance, MIN_VARIANCE);

        var pressure = 1 / v;
        var threshold = Math.sqrt(v) * (2 - Math.min(pressure * 0.01, 1));

        return dev > threshold;
      }

      function collapse() {
        mean = null;
        variance = 0;
        lastTap = null;
      }

      function handleInput(e) {
        e.preventDefault();

        var now = performance.now();

        if (lastTap !== null) {
          var dt = now - lastTap;

          if (shouldCollapse(dt)) {
            collapse();
            return;
          }

          updateState(dt);
        }

        lastTap = now;
      }

      // ONLY listener (this is key)
      surface.addEventListener("touchstart", handleInput, { passive: false });

    })();
  </script>
</body>
</html>
