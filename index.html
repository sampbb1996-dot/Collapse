<!DOCTYPE html>
<html lang="en">
<head>
  <script>document.documentElement.style.cssText="background:#000;height:100%;overflow:hidden";</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Tap Surface" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- iOS splash screens — one per device so there's no white frame on launch -->
  <link rel="apple-touch-startup-image" media="screen and (device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"  href="splash-640x1136.png" />
  <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"  href="splash-750x1334.png" />
  <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"  href="splash-1125x2436.png" />
  <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"  href="splash-828x1792.png" />
  <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"  href="splash-1242x2688.png" />
  <link rel="apple-touch-startup-image" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"  href="splash-1170x2532.png" />
  <link rel="apple-touch-startup-image" media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"  href="splash-1284x2778.png" />
  <link rel="apple-touch-startup-image" media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"  href="splash-1179x2556.png" />
  <link rel="apple-touch-startup-image" media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"  href="splash-1290x2796.png" />

  <title>Tap Surface</title>
  <style>
    *, *::before, *::after {
      -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
      -webkit-touch-callout: none !important;
      outline: none !important;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      overscroll-behavior: none;
    }
    #surface {
      position: fixed;
      inset: 0;
      background: #000;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
      will-change: transform;
    }
  </style>
</head>
<body bgcolor="#000000" style="background:#000">
  <div id="surface"></div>

  <script>
    (function () {
      var surface = document.getElementById("surface");

      var lastTap = null;
      var mean = null;
      var variance = 0;

      var ALPHA = 0.2;
      var MIN_VARIANCE = 1;

      function updateState(dt) {
        if (mean === null) {
          mean = dt;
          variance = 0;
          return;
        }
        var diff = dt - mean;
        mean += ALPHA * diff;
        variance = (1 - ALPHA) * (variance + ALPHA * diff * diff);
      }

      function shouldCollapse(dt) {
        if (mean === null) return false;
        var dev = Math.abs(dt - mean);
        var v = Math.max(variance, MIN_VARIANCE);
        var pressure = 1 / v;
        var threshold = Math.sqrt(v) * (2 - Math.min(pressure * 0.01, 1));
        return dev > threshold;
      }

      function collapse() {
        mean = null;
        variance = 0;
        lastTap = null;
      }

      function handleInput(e) {
        e.preventDefault();
        e.stopPropagation();

        var now = performance.now();

        if (lastTap !== null) {
          var dt = now - lastTap;
          if (shouldCollapse(dt)) {
            collapse();
            return;
          }
          updateState(dt);
        }

        lastTap = now;
      }

      function prevent(e) {
        e.preventDefault();
        e.stopPropagation();
      }

      surface.addEventListener("touchstart", handleInput, { passive: false, capture: true });
      surface.addEventListener("touchmove", prevent, { passive: false, capture: true });
      surface.addEventListener("touchend", prevent, { passive: false, capture: true });
      surface.addEventListener("touchcancel", prevent, { passive: false, capture: true });

      document.addEventListener("touchstart", prevent, { passive: false, capture: true });
      document.addEventListener("touchmove", prevent, { passive: false, capture: true });
    })();
  </script>
</body>
</html>
