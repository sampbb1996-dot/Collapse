<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<style>
* { -webkit-tap-highlight-color: transparent !important; }
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  touch-action: none;
}
#dot {
  width: 48px;
  height: 48px;
  border-radius: 50%;
}
</style>
</head>
<body>
<div id="dot"></div>
<script>
let state = 0;

const dot = document.getElementById('dot');
const COLORS = ['#c4b5fd', '#7dd3fc'];

function render() {
  dot.style.background = COLORS[state];
}

function onTap() {
  const hidden = Math.sin(performance.now() * 0.001);
  const alignment = 1 - Math.abs(hidden);
  const score = Math.exp(-6 * (1 - alignment));

  if (score < 0.95) {
    state = 1 - state;
  }

  render();
}

document.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
document.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.changedTouches.length === 1) onTap();
}, { passive: false });
document.addEventListener('pointerup', e => {
  if (e.pointerType !== 'touch') onTap();
});

render();
</script>
</body>
</html>
