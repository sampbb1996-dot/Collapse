<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport"
  content="width=device-width,
           height=device-height,
           initial-scale=1.0,
           maximum-scale=1.0,
           user-scalable=no">
<style>
html, body, * { -webkit-tap-highlight-color: transparent !important; }
html, body {
  margin:0; padding:0;
  width:100%; height:100%;
  background: rgb(130, 60, 255);
  overflow:hidden;
  -webkit-user-select:none;
  user-select:none;
}
body { -webkit-touch-callout:none; touch-action:none; }
#score {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: rgba(255,255,255,0.6);
  font: 32px monospace;
  pointer-events: none;
  white-space: pre;
  text-align: center;
}
</style>
</head>
<body>
<div id="score">0.0000</div>
<script>
document.body.style.webkitTapHighlightColor = 'transparent';

// Single smoothing parameter — all other quantities derived from tap data
const ALPHA = 0.2;

let mean       = 0;
let variance   = 0;
let instability = 0;  // EMA of normalised error — bounded, continuous, slow decay
let prevRaw    = 0;
let drift      = 0;   // EMA of tap-to-tap raw change — rewards stability of change
let state      = 0;
let score      = 0;   // all-time improvement accumulator with continuous decay
let perfScore    = 0;   // time-weighted magnitude: integral of |state| with decay
let idleTime     = 0;   // seconds since last tap
let displayScore = 0;   // smoothed display value — visual only, no system effect
let lastTapTime = null;
let lastTime   = performance.now();

const scoreEl = document.getElementById('score');
function render() {
  const velocity = Math.abs(perfScore - displayScore);
  const k = 0.05 + Math.min(0.4, velocity * 10);
  displayScore += (perfScore - displayScore) * k;
  const s = Math.round(displayScore * 1000000).toString().padStart(7, '0');
  scoreEl.textContent = s;

  const m = Math.min(1, Math.abs(state));

  const r = Math.round(60 + 160 * m);
  const g = Math.round(80 - 60 * m);
  const b = 255;

  document.body.style.background = `rgb(${r}, ${g}, ${b})`;
  scoreEl.style.color = 'rgba(255,255,255,0.6)';
}

function onTap() {
  const now = performance.now();

  if (lastTapTime === null) {
    lastTapTime = now;
    return;
  }

  const dt = now - lastTapTime;
  lastTapTime = now;

  // Silent guard — no hard reset, no render
  if (dt <= 0) return;

  // EMA update — always applied, no rejection
  const prevMean = mean > 0 ? mean : dt;
  mean = prevMean + ALPHA * (dt - prevMean);
  const err = dt - prevMean;
  variance = (1 - ALPHA) * (variance + ALPHA * err * err);

  const std = Math.sqrt(variance + 1);

  // cv measures variability relative to mean scale — bounded by construction
  const cv = std / (std + Math.abs(mean) + 1);

  // Parabolic coherence — peaks at cv=0.5, zero at rigid (cv=0) and chaotic (cv=1)
  // No arbitrary shape constants — 4 is the natural normaliser for 4x(1-x)
  const coherence = 4 * cv * (1 - cv) * (1 - prevRaw);

  // Instability: continuous EMA of normalised deviation — never resets
  instability = (1 - ALPHA) * instability + ALPHA * (Math.abs(err) / (std + 1));

  // Penalty: inversely proportional to accumulated instability
  const penalty = 1 / (1 + instability);

  const raw = coherence * penalty;

  // Stability-of-change: EMA of tap-to-tap movement in raw
  // Rewards consistent drift direction, not static value
  drift = (1 - ALPHA) * drift + ALPHA * Math.abs(raw - prevRaw);
  const stabilityWeight = 1 / (1 + drift);

  // Continuous state update — no gate, no threshold, weighted by stability of change
  const instabilityWeight = 1 / (1 + instability);
  const direction = raw - prevRaw;
  const m = Math.abs(state);
  const gainScale = 1 / (1 + 3 * m);
  state += direction * stabilityWeight * instabilityWeight * gainScale;

  // Accumulate positive improvement only — no reset, no gate
  const improvement = Math.max(0, raw - prevRaw);
  score += improvement;

  idleTime = 0;
  prevRaw = raw;
  render();
}

function tick() {
  const now = performance.now();
  const dt = (now - lastTime) / 1000;
  lastTime = now;

  // Decay rate: instability-derived, with ALPHA as minimum floor so decay is always visible
  idleTime += dt;
  const m = Math.min(1, Math.abs(state));
  const decayRate = (ALPHA + instability / (1 + instability)) * (1 + 4 * m * m);
  state     *= Math.exp(-decayRate * dt);
  score     *= Math.exp(-decayRate * dt);
  const idlePenalty = 1 / (1 + idleTime * 2);
  perfScore += Math.abs(state) * dt * idlePenalty;
  perfScore *= Math.exp(-decayRate * dt);

  render();
  requestAnimationFrame(tick);
}

function kill(e) { e.preventDefault(); }

document.addEventListener('touchstart', kill, { passive: false });
document.addEventListener('touchmove', kill, { passive: false });
document.addEventListener('touchend', e => {
  kill(e);
  if (e.changedTouches.length === 1) onTap();
}, { passive: false });
document.addEventListener('touchcancel', kill, { passive: false });
document.addEventListener('pointerup', e => {
  if (e.pointerType !== 'touch') onTap();
});

tick();
</script>
</body>
</html>
