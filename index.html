<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<meta name="viewport"
  content="width=device-width,
           height=device-height,
           initial-scale=1.0,
           maximum-scale=1.0,
           user-scalable=no">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;

  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: rgba(0,0,0,0);
}
</style>
</head>

<body>

<script>
/*
  FINAL SYSTEM:

  - EXACTLY ONE touch at all times
  - Replacement only (no 0-state)
  - STATE ESTIMATE (timing stability)
  - HIDDEN THRESHOLD
  - COLLAPSE = full reset
*/

/* =========================
   STATE
========================= */

let activeTouchId = null;
let awaitingReplacement = false;

/* =========================
   STATE ESTIMATION (CORE)
========================= */

// timing buffer
let intervals = [];
let lastTapTime = null;

// config
const MAX_BUFFER = 20;
const BASE_THRESHOLD = 0.015; // variance threshold
let threshold = BASE_THRESHOLD;

/*
  Estimate stability from timing variance
*/
function updateEstimate() {
  if (intervals.length < 5) return 1;

  let mean = intervals.reduce((a,b)=>a+b,0) / intervals.length;

  let variance = intervals.reduce((a,b)=>a + (b-mean)*(b-mean), 0) / intervals.length;

  return variance;
}

/* =========================
   COLLAPSE
========================= */

function collapse() {
  // hard reset everything
  activeTouchId = null;
  awaitingReplacement = false;
  intervals = [];
  lastTapTime = null;

  // slight difficulty increase (adaptive)
  threshold *= 0.99;

  // visual reset (optional flash)
  document.body.style.background = "#111";
  setTimeout(() => {
    document.body.style.background = "#000";
  }, 50);
}

/* =========================
   TOUCH LOGIC
========================= */

function kill(e) {
  e.preventDefault();
}

document.addEventListener('touchstart', e => {
  kill(e);

  const now = Date.now();

  // Initial acquire
  if (activeTouchId === null && e.touches.length === 1) {
    activeTouchId = e.touches[0].identifier;
    awaitingReplacement = false;
    lastTapTime = now;
    return;
  }

  // Replacement
  if (awaitingReplacement && e.touches.length === 2) {
    for (const t of e.touches) {
      if (t.identifier !== activeTouchId) {

        // timing interval
        if (lastTapTime !== null) {
          let dt = now - lastTapTime;
          intervals.push(dt);

          if (intervals.length > MAX_BUFFER) {
            intervals.shift();
          }
        }

        lastTapTime = now;

        // evaluate state
        const estimate = updateEstimate();

        if (estimate > threshold) {
          collapse();
          return;
        }

        // switch touch
        activeTouchId = t.identifier;
        awaitingReplacement = false;
        break;
      }
    }
  }
}, { passive: false });

document.addEventListener('touchend', e => {
  kill(e);

  for (const t of e.changedTouches) {
    if (t.identifier === activeTouchId) {
      awaitingReplacement = true;
      return;
    }
  }
}, { passive: false });

document.addEventListener('touchmove', kill, { passive: false });

document.addEventListener('touchcancel', e => {
  kill(e);
  collapse();
}, { passive: false });

</script>

</body>
</html>
