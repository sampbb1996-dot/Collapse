<!DOCTYPE html>
<html lang="en">
<head>

<script>
document.documentElement.style.background = "#000";
</script>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#000000" />

<style>
html {
  background: #000 !important;
}

*, *::before, *::after {
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  touch-action: none;
}

#surface {
  position: fixed;
  inset: 0;
  background: #000;
  touch-action: none;
}

#score {
  position: fixed;
  top: 10px;
  right: 10px;
  color: #0f0;
  font-family: monospace;
  font-size: 16px;
  display: none;
}
</style>
</head>

<body>

<div id="surface"></div>
<div id="score">0</div>

<script>
(function () {
  var surface = document.getElementById("surface");
  var scoreEl = document.getElementById("score");

  var lastTap = null;

  // decay state
  var mean = null;
  var variance = 0;

  var score = 0;
  var showScore = false;

  var ALPHA = 0.2;
  var MIN_VARIANCE = 1;

  function updateState(dt) {
    if (mean === null) {
      mean = dt;
      variance = 0;
      return;
    }

    var diff = dt - mean;

    mean += ALPHA * diff;
    variance = (1 - ALPHA) * (variance + ALPHA * diff * diff);
  }

  function updateScore() {
    var v = Math.max(variance, MIN_VARIANCE);
    var pressure = 1 / v;
    score += pressure;
  }

  function shouldCollapse(dt) {
    if (mean === null) return false;

    var dev = Math.abs(dt - mean);
    var v = Math.max(variance, MIN_VARIANCE);

    var pressure = 1 / v;
    var threshold = Math.sqrt(v) * (2 - Math.min(pressure * 0.01, 1));

    return dev > threshold;
  }

  function collapse() {
    score *= 0.5;
    mean = null;
    variance = 0;
    lastTap = null;
  }

  function handleInput(e) {
    e.preventDefault();

    var x = e.clientX;
    var y = e.clientY;

    // toggle zone
    if (x < 80 && y < 80) {
      showScore = !showScore;
      scoreEl.style.display = showScore ? "block" : "none";
      return;
    }

    var now = performance.now();

    if (lastTap !== null) {
      var dt = now - lastTap;

      if (shouldCollapse(dt)) {
        collapse();
        return;
      }

      updateState(dt);
      updateScore();
    }

    lastTap = now;

    if (showScore) {
      scoreEl.textContent = Math.floor(score);
    }
  }

  // ONLY one listener (critical)
  surface.addEventListener("touchstart", handleInput, { passive: false });

})();
</script>

</body>
</html>
