<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
body {
  margin: 0;
  background: #000;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
#dot {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: #c4b5fd;
}
</style>
</head>
<body>
<div id="dot"></div>
<script>
const EPSILON = 0.002;

let tapBest = 0;
let state = 0; // 0 or 1

const dot = document.getElementById('dot');
document.body.style.background = '#000';

function render() {
  document.body.style.background = '#000';
  dot.style.background = state ? '#7dd3fc' : '#c4b5fd';
}

function onTap() {
  const hidden = Math.sin(performance.now() * 0.001);
  const alignment = 1 - Math.abs(hidden);
  const score = Math.exp(-6 * (1 - alignment));

  const success = score >= tapBest + EPSILON;

  if (success) {
    tapBest = score;      // stay in current state
  } else {
    tapBest = 0;
    state = 1 - state;    // flip state
  }

  render();
}

document.addEventListener('touchstart', e => e.preventDefault(), { passive: false });

document.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.changedTouches.length === 1) onTap();
}, { passive: false });

document.addEventListener('pointerup', e => {
  if (e.pointerType !== 'touch') onTap();
});

render();
</script>
</body>
</html>
